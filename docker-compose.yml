services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: nixus
      POSTGRES_PASSWORD: nixus
      POSTGRES_DB: nixus_sql
    ports:
      - "${DB_HOST_PORT:-5433}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nixus -d nixus_sql"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s

  api:
    build: .
    entrypoint: ["/bin/bash", "scripts/entrypoint.sh"]
    env_file: .env
    environment:
      DATABASE_URL: postgresql://nixus:nixus@db:5432/nixus_sql
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  ui:
    build: .
    command: >
      streamlit run ui/app.py
      --server.port 8501
      --server.address 0.0.0.0
      --browser.gatherUsageStats false
    env_file: .env
    environment:
      API_BASE_URL: http://api:8000
    ports:
      - "8501:8501"
    depends_on:
      - api

volumes:
  pgdata:
