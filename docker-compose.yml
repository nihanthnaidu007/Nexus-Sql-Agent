name: nixus-sql-agent

services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: nixus
      POSTGRES_PASSWORD: nixus
      POSTGRES_DB: nixus_sql
    ports:
      - "${DB_HOST_PORT:-5433}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      # On first init, provision the read-only role (nixus_readonly) + the sample
      # TARGET databases. `10` creates the role + nixus_chinook (alt demo); `20`
      # creates the FROZEN benchmark target nixus_saas (loaded from the benchmark
      # seed); `30` creates the DEFAULT stack target nixus_saas_demo (the RICH,
      # time-spread demo data the UI draws compelling charts from). Both `20` and
      # `30` run on a fresh init — SEPARATE databases, SEPARATE seeds — so the
      # demo can NEVER perturb the benchmark.
      # Only applied on a fresh init: `docker compose down -v && docker compose up`.
      - ./scripts/init-target-db.sql:/docker-entrypoint-initdb.d/10-init-target-db.sql:ro
      - ./scripts/init-saas-db.sh:/docker-entrypoint-initdb.d/20-init-saas-db.sh:ro
      - ./scripts/init-demo-db.sh:/docker-entrypoint-initdb.d/30-init-demo-db.sh:ro
      # Schema + seeds, mounted read-only OUTSIDE initdb.d (so they are not
      # auto-run against the wrong db). The schema is shared; `20` loads
      # saas_seed into nixus_saas, `30` loads the RICH saas_demo_seed into
      # nixus_saas_demo.
      - ./eval/saas_schema.sql:/opt/nixus-saas/saas_schema.sql:ro
      - ./eval/saas_seed.sql:/opt/nixus-saas/saas_seed.sql:ro
      - ./eval/saas_demo_seed.sql:/opt/nixus-saas/saas_demo_seed.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nixus -d nixus_sql"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s

  api:
    build: .
    entrypoint: ["/bin/bash", "scripts/entrypoint.sh"]
    env_file: .env
    environment:
      # DEFAULT = the self-contained RICH demo (nixus_saas_demo) — the data the UI
      # draws compelling multi-row / time-series charts from. These in-compose
      # values OVERRIDE any localhost URLs in .env (compose `environment` beats
      # `env_file`), so the container is demo-aligned without editing .env. Only
      # the API keys come from .env. To run the FROZEN benchmark target, the alt
      # Chinook demo, or a real DB, use the single switch:
      #   scripts/use_target.sh <demo|saas|chinook|URL>   (then: docker compose up -d api)
      # The benchmark path is UNCHANGED: eval/run_saas_benchmark.py still rebuilds
      # + measures the FROZEN nixus_saas; only the stack's default target moved.
      #
      # state_db — NIXUS-owned bookkeeping, READ-WRITE (owner role `nixus`).
      STATE_DATABASE_URL: postgresql://nixus:nixus@db:5432/nixus_sql
      # target_db — the user's data, STRICTLY READ-ONLY (role `nixus_readonly`).
      # This is the ONLY handle the app has to the target. Default: nixus_saas_demo.
      TARGET_DATABASE_URL: postgresql://nixus_readonly:nixus_readonly@db:5432/nixus_saas_demo
      # Writable OWNER connection to the target — used ONLY by the one-time seed /
      # the idempotent demo ensure step, never by the app at runtime.
      TARGET_ADMIN_DATABASE_URL: postgresql://nixus:nixus@db:5432/nixus_saas_demo
      # Legacy alias kept for back-compat (resolves to state).
      DATABASE_URL: postgresql://nixus:nixus@db:5432/nixus_sql
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  # React (Next.js) frontend — Phase 8. The single UI the one-command demo opens
  # (the legacy Python UI service was retired once React fully replaced it).
  # The browser runs on the HOST, so it calls the API at http://localhost:8000
  # (NOT http://api:8000 — that name only resolves inside the compose network).
  # NEXT_PUBLIC_* is inlined at BUILD time, so the URL is passed as a build ARG.
  # CORS on the API already allows http://localhost:3000 (nixus/config.py).
  web:
    build:
      context: ./web
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  pgdata:
