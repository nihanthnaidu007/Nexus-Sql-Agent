name: nixus-sql-agent

services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: nixus
      POSTGRES_PASSWORD: nixus
      POSTGRES_DB: nixus_sql
    ports:
      - "${DB_HOST_PORT:-5433}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      # On first init, provision the read-only role (nixus_readonly) + both sample
      # TARGET databases. `10` creates the role + nixus_chinook (alt demo); `20`
      # creates the DEFAULT target nixus_saas and LOADS + SEEDS it from the same
      # SQL the benchmark uses, so the first query works with no manual step.
      # Only applied on a fresh init: `docker compose down -v && docker compose up`.
      - ./scripts/init-target-db.sql:/docker-entrypoint-initdb.d/10-init-target-db.sql:ro
      - ./scripts/init-saas-db.sh:/docker-entrypoint-initdb.d/20-init-saas-db.sh:ro
      # SaaS schema + seed, mounted read-only OUTSIDE initdb.d (so they are not
      # auto-run against the wrong db); 20-init-saas-db.sh loads them into nixus_saas.
      - ./eval/saas_schema.sql:/opt/nixus-saas/saas_schema.sql:ro
      - ./eval/saas_seed.sql:/opt/nixus-saas/saas_seed.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nixus -d nixus_sql"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s

  api:
    build: .
    entrypoint: ["/bin/bash", "scripts/entrypoint.sh"]
    env_file: .env
    environment:
      # DEFAULT = the self-contained SaaS sample demo. These in-compose values
      # OVERRIDE any localhost URLs in .env (compose `environment` beats `env_file`),
      # so the container is SaaS-aligned without editing .env. Only the API keys
      # come from .env. To run the alt Chinook demo or a real DB, use the single
      # switch: scripts/use_target.sh <saas|chinook|URL>.
      #
      # state_db — NIXUS-owned bookkeeping, READ-WRITE (owner role `nixus`).
      STATE_DATABASE_URL: postgresql://nixus:nixus@db:5432/nixus_sql
      # target_db — the user's data, STRICTLY READ-ONLY (role `nixus_readonly`).
      # This is the ONLY handle the app has to the target. Default: nixus_saas.
      TARGET_DATABASE_URL: postgresql://nixus_readonly:nixus_readonly@db:5432/nixus_saas
      # Writable OWNER connection to the target — used ONLY by the one-time seed /
      # the idempotent SaaS ensure step, never by the app at runtime.
      TARGET_ADMIN_DATABASE_URL: postgresql://nixus:nixus@db:5432/nixus_saas
      # Legacy alias kept for back-compat (resolves to state).
      DATABASE_URL: postgresql://nixus:nixus@db:5432/nixus_sql
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  ui:
    build: .
    command: >
      streamlit run ui/app.py
      --server.port 8501
      --server.address 0.0.0.0
      --browser.gatherUsageStats false
    env_file: .env
    environment:
      API_BASE_URL: http://api:8000
    ports:
      - "8501:8501"
    depends_on:
      - api

volumes:
  pgdata:
