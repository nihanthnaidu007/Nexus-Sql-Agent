name: nixus-sql-agent

services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: nixus
      POSTGRES_PASSWORD: nixus
      POSTGRES_DB: nixus_sql
    ports:
      - "${DB_HOST_PORT:-5433}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      # On first init, provision the read-only TARGET database (nixus_chinook)
      # and the SELECT-only role (nixus_readonly). Only applied on a fresh init:
      # `docker compose down -v && docker compose up`.
      - ./scripts/init-target-db.sql:/docker-entrypoint-initdb.d/10-init-target-db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nixus -d nixus_sql"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s

  api:
    build: .
    entrypoint: ["/bin/bash", "scripts/entrypoint.sh"]
    env_file: .env
    environment:
      # state_db — NIXUS-owned bookkeeping, READ-WRITE (owner role `nixus`).
      STATE_DATABASE_URL: postgresql://nixus:nixus@db:5432/nixus_sql
      # target_db — the user's data, STRICTLY READ-ONLY (role `nixus_readonly`).
      # This is the ONLY handle the app has to the target.
      TARGET_DATABASE_URL: postgresql://nixus_readonly:nixus_readonly@db:5432/nixus_chinook
      # Writable OWNER connection to the target — used ONLY by the one-time
      # Chinook seed (scripts/migrate_chinook.py), never by the app at runtime.
      TARGET_ADMIN_DATABASE_URL: postgresql://nixus:nixus@db:5432/nixus_chinook
      # Legacy alias kept for back-compat (resolves to state).
      DATABASE_URL: postgresql://nixus:nixus@db:5432/nixus_sql
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  ui:
    build: .
    command: >
      streamlit run ui/app.py
      --server.port 8501
      --server.address 0.0.0.0
      --browser.gatherUsageStats false
    env_file: .env
    environment:
      API_BASE_URL: http://api:8000
    ports:
      - "8501:8501"
    depends_on:
      - api

volumes:
  pgdata:
